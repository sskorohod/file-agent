database:
  path: data/agent.db
embedding:
  batch_size: 32
  chunk_overlap_words: 50
  chunk_size_words: 400
  local_fallback_model: all-MiniLM-L6-v2
  model: gemini-embedding-2-preview
  provider: gemini
  vector_size: 768
llm:
  classification_prompt: "You are a document classification system.\r\n\r\nRules:\r\
    \n- summary: одно короткое предложение на русском (fallback quick reference).\r\
    \n- tags: 2-4 relevant tags, lowercase\r\n- document_type: specific type (e.g.\
    \ lab_result, invoice, passport, marketing_guide, manual, report)"
  file_summary_prompt: "Напиши краткое описание документа (2-4 предложения на русском).\
    \ Что это, о чём, для чего нужен. Только факты из текста."
  default_provider: openai
  models:
    analysis:
      api_base: http://127.0.0.1:10531/v1
      api_key: dummy
      max_tokens: 4096
      model: openai/gpt-5.1
      temperature: 0.1
    classification:
      api_base: http://127.0.0.1:10531/v1
      api_key: dummy
      max_tokens: 1024
      model: openai/gpt-5.4-mini
      temperature: 0.1
    extraction:
      api_base: http://127.0.0.1:10531/v1
      api_key: dummy
      max_tokens: 4096
      model: openai/gpt-5.4-mini
      temperature: 0.2
    search:
      api_base: http://127.0.0.1:10531/v1
      api_key: dummy
      max_tokens: 4096
      model: openai/gpt-5.1
      temperature: 0.3
  retry:
    backoff_base: 2
    max_attempts: 3
  search_prompt: "You are a document search assistant for a personal archive.\r\n\r\
    \nRules:\r\n- Find the ONE most relevant document that answers the question\r\n\
    - Give a FULL, detailed answer about that document\r\n- Include specific details:\
    \ dates, names, numbers, amounts\r\n- If the document has action items or deadlines\
    \ — mention them\r\n- Respond in the same language as the question\r\n- Do NOT\
    \ mention multiple documents — pick the best one"
logging:
  format: '%(asctime)s [%(levelname)s] %(name)s: %(message)s'
  level: INFO
qdrant:
  collection_name: file_agent_v2
  distance: Cosine
  grpc_port: 6334
  host: localhost
  port: 6333
  vector_size: 768
skills:
  auto_reload: true
  directory: skills/
  reload_interval_seconds: 30
storage:
  allowed_extensions:
  - .pdf
  - .png
  - .jpg
  - .jpeg
  - .heic
  - .docx
  - .txt
  - .csv
  - .xlsx
  - .md
  backend: local
  base_path: ~/ai-agent-files
  max_file_size_mb: 50
telegram:
  max_file_size_mb: 20
  polling_timeout: 30
  # owner_id: set via TELEGRAM__OWNER_ID env var
  webhook_url: https://fag.n8nskorx.top/telegram/webhook
  # webhook_secret: set via TELEGRAM__WEBHOOK_SECRET env var
  auto_delete_seconds: 120
  # pin_code: set via TELEGRAM__PIN_CODE env var
web:
  host: 0.0.0.0
  port: 8000
notes:
  enabled: true
  processing_interval_seconds: 900
  checkin_hour: 21
  checkin_enabled: true
  inbox_watch_enabled: true
  inbox_watch_interval: 10
  expected_daily_categories:
    - food
    - personal
    - fitness
  expected_daily_signals:
    - food_intake
    - mood_score
    - sleep_hours
    - weight_kg
    - daily_reflection
  checkin_max_questions: 5
  checkin_include_closing_prompt: true
  checkin_weight_frequency_days: 7
  auto_embed: true
  correlation_metrics:
    - mood_score
    - calories
    - sleep_hours
    - weight_kg
    - energy
