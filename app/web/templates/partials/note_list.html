{% if notes %}
  {# Results count #}
  <div class="flex items-center gap-2 mb-2 px-0.5">
    <p class="text-[11px] text-txt-3">
      <span class="font-medium text-txt-2">{{ notes|length }}</span> результатов
    </p>
    {% if semantic_ids is defined and semantic_ids %}
    <span class="inline-flex items-center gap-1 text-[10px] font-medium px-1.5 py-0.5 rounded-md bg-accent/8 text-accent-2">
      <svg class="w-2.5 h-2.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a4 4 0 014 4c0 1.95-2 3-2 8h-4c0-5-2-6.05-2-8a4 4 0 014-4z"/></svg>
      semantic
    </span>
    {% endif %}
  </div>

  <div class="space-y-2">
    {% for n in notes %}
    {% include "partials/_note_card.html" %}
    {% endfor %}
  </div>
{% else %}
<div class="flex flex-col items-center justify-center py-12 text-center">
  <div class="w-10 h-10 rounded-xl bg-surface-2 flex items-center justify-center mb-3">
    <svg class="w-5 h-5 text-txt-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  </div>
  <p class="text-sm font-medium text-txt mb-0.5">Ничего не найдено</p>
  <p class="text-xs text-txt-3">Попробуйте другой запрос или режим поиска</p>
</div>
{% endif %}
