<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<title>Login — Smart Storage</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📁</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/styles.css">
<style>
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .animate-shake { animation: shake 0.5s ease-in-out; }
</style>
</head>
<body class="bg-bg font-sans antialiased min-h-screen flex items-center justify-center p-4">

{# Background subtle gradient #}
<div class="fixed inset-0 bg-[radial-gradient(ellipse_at_top,rgba(124,58,237,0.08),transparent_60%)]"></div>

<div class="relative w-full max-w-sm animate-fade-in">
  {# Logo #}
  <div class="flex items-center justify-center gap-3 mb-8">
    <div class="w-11 h-11 bg-accent rounded-2xl flex items-center justify-center shadow-lg shadow-accent/25">
      <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
    </div>
    <div>
      <div class="text-xl font-bold text-txt">Smart Storage</div>
      <div class="text-[11px] text-txt-3 tracking-wide">AI Knowledge Base</div>
    </div>
  </div>

  {# Login card #}
  <div class="bg-surface rounded-2xl border border-border p-7 shadow-2xl shadow-black/20">
    <h1 class="text-lg font-semibold text-txt mb-1">Welcome back</h1>
    <p class="text-sm text-txt-3 mb-6">Sign in to your account</p>

    <form method="POST" action="/login" class="space-y-4">
      {# Email #}
      <div class="space-y-1.5">
        <label for="login" class="block text-xs font-medium text-txt-2">Email</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-txt-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg>
          <input type="email" id="login" name="login" placeholder="you@example.com" required autofocus
                 class="w-full bg-surface-2 border border-border rounded-lg pl-10 pr-4 py-2.5 text-sm text-txt placeholder:text-txt-3 focus:outline-none focus:ring-2 focus:ring-accent/25 focus:border-accent transition-all">
        </div>
      </div>

      {# Password #}
      <div class="space-y-1.5">
        <label for="password" class="block text-xs font-medium text-txt-2">Password</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-txt-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter password" required
                 class="w-full bg-surface-2 border border-border rounded-lg pl-10 pr-4 py-2.5 text-sm text-txt placeholder:text-txt-3 focus:outline-none focus:ring-2 focus:ring-accent/25 focus:border-accent transition-all">
        </div>
      </div>

      {# Submit #}
      <button type="submit"
              class="w-full bg-accent hover:bg-accent-hover text-white font-medium py-2.5 rounded-lg text-sm transition-all active:scale-[.98] cursor-pointer shadow-lg shadow-accent/20 mt-2">
        Sign in
      </button>
    </form>

    {# Error #}
    {% if error %}
    <div class="mt-4 px-4 py-3 rounded-lg bg-err-bg border border-err/20 text-err text-sm animate-shake flex items-center gap-2">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}
  </div>

  <p class="text-center text-xs text-txt-3 mt-5">Smart Storage v0.2.0 &middot; Personal Knowledge Base</p>
</div>
</body>
</html>
